<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="icon" type="image/png" href="logo_512_transparent.png">
  <link rel="shortcut icon" href="logo_512_transparent.png">
  <link rel="apple-touch-icon" href="logo_512_transparent.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تلاوات القرآن الكريم</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&family=Reem+Kufi&display=swap" rel="stylesheet">
  <style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8b6914;
    --dark: #0d0f14;
    --dark2: #13161e;
    --dark3: #1a1e2a;
    --text-main: #f0e8d4;
    --text-muted: #9a8f7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', 'Amiri', sans-serif;
    background: var(--dark);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M30 0 L60 30 L30 60 L0 30Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ══ اسم مصطفى جيمي ══ */
  .brand-name {
    position: fixed;
    top: 16px;
    left: 20px;
    z-index: 999;
    font-family: 'Reem Kufi', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
    background: rgba(13,15,20,0.7);
    padding: 6px 14px;
    border-radius: 30px;
    border: 1px solid rgba(201,168,76,0.25);
    backdrop-filter: blur(8px);
    cursor: default;
    animation: brandFloat 3s ease-in-out infinite, brandGlow 2s ease-in-out infinite alternate;
  }

  @keyframes brandFloat {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-5px); }
  }
  @keyframes brandGlow {
    from { text-shadow: 0 0 10px rgba(201,168,76,0.3), 0 0 20px rgba(201,168,76,0.1); }
    to   { text-shadow: 0 0 20px rgba(201,168,76,0.8), 0 0 40px rgba(201,168,76,0.3); }
  }

  /* ══ أيقونات التواصل ══ */
  .social-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    gap: 14px;
    background: rgba(13,15,20,0.85);
    padding: 10px 18px;
    border-radius: 50px;
    border: 1px solid rgba(201,168,76,0.2);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .social-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .social-btn:hover { transform: translateY(-4px) scale(1.1); }
  .social-btn svg { width: 22px; height: 22px; }

  .social-btn.facebook { background: #1877f2; }
  .social-btn.facebook:hover { background: #2d8cf0; box-shadow: 0 6px 20px rgba(24,119,242,0.5); }

  .social-btn.whatsapp { background: #25d366; }
  .social-btn.whatsapp:hover { background: #20bd5a; box-shadow: 0 6px 20px rgba(37,211,102,0.5); }

  /* ══ المؤقت ══ */
  .timer-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.35);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .timer-btn:hover { background: rgba(201,168,76,0.25); transform: translateY(-4px) scale(1.1); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
  .timer-btn svg { width: 22px; height: 22px; fill: var(--gold); }
  .timer-btn.active { background: rgba(201,168,76,0.3); border-color: var(--gold); animation: timerPulse 1s ease-in-out infinite; }
  @keyframes timerPulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)} 50%{box-shadow:0 0 0 8px rgba(201,168,76,0)} }

  /* ══ Timer Panel ══ */
  .timer-panel {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    z-index: 1000;
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 18px;
    padding: 22px 24px;
    width: 280px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
  }
  .timer-panel.open {
    opacity: 1;
    pointer-events: all;
    transform: translateX(-50%) scale(1);
  }
  .timer-panel h4 {
    font-family: 'Amiri', serif;
    color: var(--gold);
    font-size: 16px;
    margin-bottom: 14px;
    text-align: center;
  }
  .timer-display {
    text-align: center;
    font-size: 36px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 3px;
    margin-bottom: 14px;
    font-family: monospace;
    text-shadow: 0 0 20px rgba(201,168,76,0.3);
  }
  .timer-inputs {
    display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
  }
  .timer-inputs input {
    flex: 1;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text-main);
    font-size: 16px;
    text-align: center;
    font-family: 'Cairo', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .timer-inputs input:focus { border-color: var(--gold); }
  .timer-inputs label { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
  .timer-btns { display: flex; gap: 8px; }
  .timer-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    transition: all .25s;
  }
  .btn-start { background: var(--gold); color: var(--dark); }
  .btn-start:hover { background: var(--gold-light); }
  .btn-stop { background: rgba(255,80,80,0.15); color: #ff6060; border: 1px solid rgba(255,80,80,0.3); }
  .btn-stop:hover { background: rgba(255,80,80,0.25); }

  /* ══ Header ══ */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 2px solid rgba(201,168,76,0.2);
  }
  .bismillah {
    font-family: 'Amiri Quran', serif;
    font-size: clamp(28px, 5vw, 42px);
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 20px;
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
  }
  .ornament { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
  .ornament-line { height: 1px; width: 80px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .ornament-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }
  header h1 { font-size: clamp(20px, 4vw, 30px); font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
  header h1 span { color: var(--gold); }
  header p { font-size: 15px; color: var(--text-muted); line-height: 1.9; font-family: 'Amiri', serif; }

  /* ══ Tabs ══ */
  .sheikh-tabs {
    position: relative; z-index: 1;
    display: flex; gap: 0;
    overflow-x: auto;
    background: var(--dark2);
    border-bottom: 2px solid rgba(201,168,76,0.2);
    padding: 0 20px;
    scrollbar-width: none;
  }
  .sheikh-tabs::-webkit-scrollbar { display: none; }
  .sheikh-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 18px 24px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 15px; font-weight: 600;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all .25s;
    user-select: none; flex-shrink: 0;
  }
  .sheikh-tab:hover { color: var(--gold-light); }
  .sheikh-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .sheikh-tab .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background .25s; flex-shrink: 0; }
  .sheikh-tab.active .dot { background: var(--gold); }

  /* ══ Container ══ */
  .container {
    position: relative; z-index: 1;
    max-width: 1280px; margin: auto;
    padding: 40px 24px 120px;
  }

  /* ══ Player ══ */
  .player-section {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 20px; overflow: hidden;
    margin-bottom: 50px;
    box-shadow: 0 0 0 1px rgba(201,168,76,0.08), 0 20px 60px rgba(0,0,0,0.5);
  }
  .player-header {
    padding: 22px 28px 18px;
    background: linear-gradient(180deg, rgba(201,168,76,0.07) 0%, transparent 100%);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex; align-items: center; gap: 14px;
  }
  .player-icon {
    width: 42px; height: 42px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .player-icon svg { width: 20px; height: 20px; fill: var(--gold); }
  .now-playing-label { font-size: 11px; color: var(--gold); letter-spacing: 2px; font-weight: 600; margin-bottom: 4px; }
  #videoTitle { font-family: 'Amiri', serif; font-size: 18px; color: var(--text-main); font-weight: 700; line-height: 1.4; }

  .player-frame { width: 100%; aspect-ratio: 16/9; }
  .player-frame iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ══ Section title ══ */
  .section-title { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .section-title h2 { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold); font-weight: 700; }
  .section-title-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent); }
  .section-count { font-size: 13px; color: var(--text-muted); background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.15); padding: 4px 12px; border-radius: 20px; }

  /* ══ Cards ══ */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; }

  .card {
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 14px; padding: 20px;
    cursor: pointer; transition: all 0.3s ease;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 60px; height: 60px;
    background: radial-gradient(circle at top right, rgba(201,168,76,0.06), transparent 70%);
    pointer-events: none;
  }
  .card:hover { border-color: rgba(201,168,76,0.45); background: var(--dark3); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.15); }
  .card.active { border-color: var(--gold); background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03)); box-shadow: 0 0 0 1px rgba(201,168,76,0.3), 0 8px 24px rgba(0,0,0,0.3); }
  .card-number { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .card.active .card-number { color: var(--gold); }
  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .card-text { flex: 1; }
  .card-play-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.3s;
  }
  .card:hover .card-play-btn, .card.active .card-play-btn { background: var(--gold); border-color: var(--gold); }
  .card-play-btn svg { width: 14px; height: 14px; fill: var(--gold); transition: fill 0.3s; margin-right: -2px; }
  .card:hover .card-play-btn svg, .card.active .card-play-btn svg { fill: var(--dark); }
  .card h3 { font-family: 'Amiri', serif; font-size: 16px; color: var(--text-main); font-weight: 700; line-height: 1.5; margin-bottom: 5px; }
  .card.active h3 { color: var(--gold-light); }
  .card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Amiri', serif; font-size: 20px; color: var(--gold); margin-bottom: 10px; }
  .empty-state p { font-size: 14px; line-height: 1.8; }
  .empty-state code { display: inline-block; margin-top: 12px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); color: var(--gold-light); padding: 8px 16px; border-radius: 8px; font-size: 13px; direction: ltr; font-family: monospace; }

  footer { position: relative; z-index: 1; text-align: center; padding: 40px 20px; border-top: 1px solid rgba(201,168,76,0.12); }
  .footer-dua { font-family: 'Amiri Quran', serif; font-size: 18px; color: var(--gold); margin-bottom: 12px; text-shadow: 0 0 30px rgba(201,168,76,0.2); }
  footer p { font-size: 13px; color: var(--text-muted); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .container { padding: 24px 16px 120px; }
    .sheikh-tab { padding: 14px 16px; font-size: 13px; }
    .brand-name { font-size: 17px; top: 12px; left: 12px; padding: 5px 11px; }
  }
  @media (max-width: 420px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>

// =====================================================
//  الكود التلقائي
// =====================================================

const arabicNums = ['٠١','٠٢','٠٣','٠٤','٠٥','٠٦','٠٧','٠٨','٠٩','١٠','١١','١٢','١٣','١٤','١٥','١٦','١٧','١٨','١٩','٢٠','٢١','٢٢','٢٣','٢٤','٢٥','٢٦','٢٧','٢٨','٢٩','٣٠','٣١','٣٢','٣٣','٣٤','٣٥','٣٦','٣٧','٣٨','٣٩','٤٠','٤١','٤٢','٤٣','٤٤','٤٥','٤٦','٤٧','٤٨','٤٩','٥٠'];

let currentSheikh = 0;
let currentVideoIdx = -1;
let currentCard = null;

// ── بناء التابز ──
function buildTabs() {
  const tabsEl = document.getElementById('sheikhTabs');
  sheikhData.forEach((s, i) => {
    const tab = document.createElement('div');
    tab.className = 'sheikh-tab' + (i === 0 ? ' active' : '');
    tab.innerHTML = `<span class="dot"></span>${s.name}`;
    tab.onclick = () => selectSheikh(i);
    tabsEl.appendChild(tab);
  });
}

function selectSheikh(idx) {
  currentSheikh = idx;
  currentVideoIdx = -1;
  currentCard = null;
  document.querySelectorAll('.sheikh-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.getElementById('videoTitle').textContent = 'اختر تلاوة للاستماع';
  document.getElementById('player').src = 'about:blank';
  renderCards(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCards(idx) {
  const sheikh = sheikhData[idx];
  const grid = document.getElementById('cardGrid');
  document.getElementById('sectionName').textContent = sheikh.name;

  if (!sheikh.videos.length) {
    document.getElementById('sectionCount').textContent = 'لا يوجد فيديوهات بعد';
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📖</div><h3>لم تُضف تلاوات بعد</h3></div>`;
    return;
  }

  const count = sheikh.videos.length;
  document.getElementById('sectionCount').textContent = (arabicNums[count - 1] || count) + ' تلاوة';
  grid.innerHTML = '';
  sheikh.videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.04) + 's';
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="card-number">${arabicNums[i] || (i + 1)}</div>
      <div class="card-top">
        <div class="card-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="card-text"><h3>${v.title}</h3><p>${v.desc}</p></div>
      </div>`;
    card.onclick = () => playByIdx(i);
    grid.appendChild(card);
  });
}

function playByIdx(idx) {
  const sheikh = sheikhData[currentSheikh];
  if (idx < 0 || idx >= sheikh.videos.length) return;

  const v = sheikh.videos[idx];
  currentVideoIdx = idx;

  // تحديث الكارت
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const cards = document.querySelectorAll('.card');
  if (cards[idx]) cards[idx].classList.add('active');
  currentCard = cards[idx] || null;

  // تشغيل الفيديو مع enablejsapi لمعرفة انتهائه
  document.getElementById('player').src =
    `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;
  document.getElementById('videoTitle').textContent = v.title;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── تشغيل تلقائي للفيديو التالي ──
// نستخدم postMessage من YouTube IFrame API
window.addEventListener('message', function(e) {
  try {
    const data = JSON.parse(e.data);
    // state=0 يعني انتهى الفيديو
    if (data.event === 'onStateChange' && data.info === 0) {
      playNext();
    }
  } catch(err) {}
});

function playNext() {
  if (timerExpired) return; // لو المؤقت خلص وقف
  const sheikh = sheikhData[currentSheikh];
  const nextIdx = currentVideoIdx + 1;
  if (nextIdx < sheikh.videos.length) {
    playByIdx(nextIdx);
  }
}

// ── المؤقت ──
let timerInterval = null;
let timerSeconds = 0;
let timerExpired = false;

function toggleTimerPanel() {
  document.getElementById('timerPanel').classList.toggle('open');
}

// أغلق اللوحة لو ضغط برا
document.addEventListener('click', function(e) {
  const panel = document.getElementById('timerPanel');
  const btn = document.getElementById('timerBtn');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});

function startTimer() {
  const h = parseInt(document.getElementById('timerHours').value) || 0;
  const m = parseInt(document.getElementById('timerMins').value) || 0;
  const total = (h * 3600) + (m * 60);
  if (total <= 0) return;

  stopTimer();
  timerSeconds = total;
  timerExpired = false;
  document.getElementById('timerBtn').classList.add('active');
  updateTimerDisplay();

  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      stopTimer();
      timerExpired = true;
      // أوقف الفيديو
      document.getElementById('player').src = 'about:blank';
      document.getElementById('videoTitle').textContent = 'انتهى المؤقت 🌙';
      document.getElementById('timerDisplay').textContent = 'انتهى ✓';
    }
  }, 1000);

  document.getElementById('timerPanel').classList.remove('open');
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timerBtn').classList.remove('active');
}

function updateTimerDisplay() {
  const h = Math.floor(timerSeconds / 3600);
  const m = Math.floor((timerSeconds % 3600) / 60);
  const s = timerSeconds % 60;
  const display = h > 0
    ? `${pad(h)}:${pad(m)}:${pad(s)}`
    : `${pad(m)}:${pad(s)}`;
  document.getElementById('timerDisplay').textContent = display;
}

function pad(n) { return String(n).padStart(2, '0'); }

// ── Init ──
buildTabs();
renderCards(0);
</script>
