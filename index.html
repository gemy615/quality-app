<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dark: #8b6914;
  --dark: #0d0f14;
  --dark2: #13161e;
  --dark3: #1a1e2a;
  --text-main: #f0e8d4;
  --text-muted: #9a8f7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Cairo', 'Amiri', sans-serif;
  background: var(--dark);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M30 0 L60 30 L30 60 L0 30Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative; z-index: 1;
  text-align: center;
  padding: 60px 20px 40px;
  border-bottom: 2px solid rgba(201,168,76,0.2);
}

.bismillah {
  font-family: 'Amiri Quran', serif;
  font-size: clamp(28px, 5vw, 42px);
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 20px;
  text-shadow: 0 0 40px rgba(201,168,76,0.3);
}

.ornament {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; margin-bottom: 16px;
}
.ornament-line { height: 1px; width: 80px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.ornament-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }

header h1 { font-size: clamp(20px, 4vw, 30px); font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
header h1 span { color: var(--gold); }
header p { font-size: 15px; color: var(--text-muted); line-height: 1.9; font-family: 'Amiri', serif; }

/* ── Sheikh Tabs ── */
.sheikh-tabs {
  position: relative; z-index: 1;
  display: flex; gap: 0;
  overflow-x: auto;
  background: var(--dark2);
  border-bottom: 2px solid rgba(201,168,76,0.2);
  padding: 0 20px;
  scrollbar-width: none;
}
.sheikh-tabs::-webkit-scrollbar { display: none; }

.sheikh-tab {
  display: flex; align-items: center; gap: 8px;
  padding: 18px 24px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all .25s;
  user-select: none;
  flex-shrink: 0;
}
.sheikh-tab:hover { color: var(--gold-light); }
.sheikh-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.sheikh-tab .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background .25s;
  flex-shrink: 0;
}
.sheikh-tab.active .dot { background: var(--gold); }

/* ── Container ── */
.container {
  position: relative; z-index: 1;
  max-width: 1280px;
  margin: auto;
  padding: 40px 24px 60px;
}

/* ── Player ── */
.player-section {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 50px;
  box-shadow: 0 0 0 1px rgba(201,168,76,0.08), 0 20px 60px rgba(0,0,0,0.5);
}

.player-header {
  padding: 22px 28px 18px;
  background: linear-gradient(180deg, rgba(201,168,76,0.07) 0%, transparent 100%);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  display: flex; align-items: center; gap: 14px;
}
.player-icon {
  width: 42px; height: 42px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.player-icon svg { width: 20px; height: 20px; fill: var(--gold); }
.now-playing-label { font-size: 11px; color: var(--gold); letter-spacing: 2px; font-weight: 600; margin-bottom: 4px; }
#videoTitle { font-family: 'Amiri', serif; font-size: 18px; color: var(--text-main); font-weight: 700; line-height: 1.4; }

.player-frame { width: 100%; aspect-ratio: 16/9; }
.player-frame iframe { width: 100%; height: 100%; border: none; display: block; }

/* ── Section title ── */
.section-title {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 28px;
}
.section-title h2 { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold); font-weight: 700; }
.section-title-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent); }
.section-count {
  font-size: 13px; color: var(--text-muted);
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.15);
  padding: 4px 12px; border-radius: 20px;
}

/* ── Cards ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
}

.card {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.card::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 60px; height: 60px;
  background: radial-gradient(circle at top right, rgba(201,168,76,0.06), transparent 70%);
  pointer-events: none;
}
.card:hover {
  border-color: rgba(201,168,76,0.45);
  background: var(--dark3);
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.15);
}
.card.active {
  border-color: var(--gold);
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03));
  box-shadow: 0 0 0 1px rgba(201,168,76,0.3), 0 8px 24px rgba(0,0,0,0.3);
}

.card-number { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
.card.active .card-number { color: var(--gold); }

.card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.card-text { flex: 1; }

.card-play-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.25);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.3s;
}
.card:hover .card-play-btn, .card.active .card-play-btn {
  background: var(--gold); border-color: var(--gold);
}
.card-play-btn svg { width: 14px; height: 14px; fill: var(--gold); transition: fill 0.3s; margin-right: -2px; }
.card:hover .card-play-btn svg, .card.active .card-play-btn svg { fill: var(--dark); }

.card h3 { font-family: 'Amiri', serif; font-size: 16px; color: var(--text-main); font-weight: 700; line-height: 1.5; margin-bottom: 5px; }
.card.active h3 { color: var(--gold-light); }
.card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-family: 'Amiri', serif; font-size: 20px; color: var(--gold); margin-bottom: 10px; }
.empty-state p { font-size: 14px; line-height: 1.8; }
.empty-state code {
  display: inline-block;
  margin-top: 12px;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold-light);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  direction: ltr;
  font-family: monospace;
}

footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 40px 20px;
  border-top: 1px solid rgba(201,168,76,0.12);
}
.footer-dua { font-family: 'Amiri Quran', serif; font-size: 18px; color: var(--gold); margin-bottom: 12px; text-shadow: 0 0 30px rgba(201,168,76,0.2); }
footer p { font-size: 13px; color: var(--text-muted); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr 1fr; }
  .container { padding: 24px 16px 40px; }
  .sheikh-tab { padding: 14px 16px; font-size: 13px; }
}
@media (max-width: 420px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

//  الكود التلقائي — لا تعدل تحت هذا السطر
// =====================================================

const arabicNums = ['٠١','٠٢','٠٣','٠٤','٠٥','٠٦','٠٧','٠٨','٠٩','١٠','١١','١٢','١٣','١٤','١٥','١٦','١٧','١٨','١٩','٢٠','٢١','٢٢','٢٣','٢٤','٢٥','٢٦','٢٧','٢٨','٢٩','٣٠'];
let currentSheikh = 0;
let currentCard = null;

function buildTabs() {
  const tabsEl = document.getElementById('sheikhTabs');
  sheikhData.forEach((s, i) => {
    const tab = document.createElement('div');
    tab.className = 'sheikh-tab' + (i === 0 ? ' active' : '');
    tab.innerHTML = `<span class="dot"></span>${s.name}`;
    tab.onclick = () => selectSheikh(i);
    tabsEl.appendChild(tab);
  });
}

function selectSheikh(idx) {
  currentSheikh = idx;
  currentCard = null;
  document.querySelectorAll('.sheikh-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.getElementById('videoTitle').textContent = 'اختر تلاوة للاستماع';
  document.getElementById('player').src = 'about:blank';
  renderCards(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCards(idx) {
  const sheikh = sheikhData[idx];
  const grid = document.getElementById('cardGrid');
  document.getElementById('sectionName').textContent = sheikh.name;

  if (!sheikh.videos.length) {
    document.getElementById('sectionCount').textContent = 'لا يوجد فيديوهات بعد';
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📖</div>
        <h3>لم تُضف تلاوات بعد</h3>
      </div>`;
    return;
  }

  document.getElementById('sectionCount').textContent = arabicNums[sheikh.videos.length - 1] + ' تلاوة';
  grid.innerHTML = '';
  sheikh.videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="card-number">${arabicNums[i] || (i+1)}</div>
      <div class="card-top">
        <div class="card-play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="card-text">
          <h3>${v.title}</h3>
          <p>${v.desc}</p>
        </div>
      </div>`;
    card.onclick = () => playVideo(card, v.id, v.title);
    grid.appendChild(card);
  });
}

function playVideo(card, id, title) {
  if (currentCard) currentCard.classList.remove('active');
  card.classList.add('active');
  currentCard = card;
  document.getElementById('player').src =
    'https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0&modestbranding=1';
  document.getElementById('videoTitle').textContent = title;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildTabs();
renderCards(0);
</script>
